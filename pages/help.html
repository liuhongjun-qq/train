<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>帮助中心</title>
</head>
<body>
    <h2>帮助中心</h2>
    <div class="help-section">
        <h3>用户注册</h3>
        <p>访问 <a href="/register">注册页面</a>，填写用户名、密码、邮箱和手机号即可完成注册。</p>
    </div>
    <div class="help-section">
        <h3>用户登录</h3>
        <p>访问 <a href="/login">登录页面</a>，输入用户名和密码即可登录系统。</p>
    </div>
    <div class="help-section">
        <h3>用户搜索</h3>
        <p>登录后，在首页搜索框中输入用户名即可搜索其他用户。</p>
    </div>
    <div class="help-section">
        <h3>头像上传</h3>
        <p>登录后访问 <a href="/upload">上传页面</a>，选择图片即可上传头像。</p>
    </div>
    <div class="help-section">
        <h3>个人中心与充值</h3>
        <p>登录后访问 <a href="/profile">个人中心</a> 查看个人信息并进行账户充值。</p>
    </div>
</body>
</html>
